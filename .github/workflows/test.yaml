name: test
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  go_test:
    strategy:
      fail-fast: false
      matrix:
        directory:
          - go-fasthttp-dual-stack
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      - run: go build
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          working-directory: ${{ matrix.directory }}
  ninja_test:
    strategy:
      fail-fast: false
      matrix:
        directory:
          - c-hello
          - c-stack-operation-elimination
          - ninja-phony
          - ninja-parallel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: homebrew/actions/setup-homebrew@master
      - run: brew install llvm ninja
      - run: ninja
  node_js_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          lfs: true
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version-file: package.json
      - run: pnpm i --frozen-lockfile
      - run: pnpm -r build
      - run: node --run lint
      - run: pnpm -r test
  python_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: pipx install uv
      - run: uv sync --all-packages
      - run: uv format --check
      - run: uv run pyrefly check
      - run: uv run pytest
  ruby_test:
    strategy:
      fail-fast: false
      matrix:
        directory:
          - cucumber-example-escape
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
      - run: bundler
      - run: bundler exec cucumber --publish-quiet
  rust_test:
    strategy:
      fail-fast: false
      matrix:
        directory:
          - .
          - rust-dyn-future
          - rust-generator
          - rust-hello-world
          - rust-libc
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: cargo build
      - run: cargo clippy
      - run: cargo fmt --check
      - run: cargo test
  scheme_test:
    strategy:
      fail-fast: false
      matrix:
        directory:
          - scheme-call-cc
          - scheme-eval
          - scheme-lzss
          - scheme-macro
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: homebrew/actions/setup-homebrew@master
      - run: brew install gauche
      - run: gosh main.scm
  shell_test:
    strategy:
      fail-fast: false
      matrix:
        directory:
          - llvm-c-calling-convention
          - llvm-pointer-tag
          - llvm-unnamed-addr
          - mlir-c-wrapper
          - scheme-shift-reset
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: homebrew/actions/setup-homebrew@master
      - run: sudo apt update --fix-missing
      - run: sudo apt install gcc-multilib
      - run: ./main.sh
  spell_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: streetsidesoftware/cspell-action@de2a73e963e7443969755b648a1008f77033c5b2 # v8.4.0
  test:
    runs-on: ubuntu-latest
    needs:
      - go_test
      - ninja_test
      - node_js_test
      - ruby_test
      - rust_test
      - scheme_test
      - shell_test
      - spell_check
    if: ${{ always() }}
    steps:
      - run: |
          for result in ${{ join(needs.*.result, ' ') }}; do
            [ $result = success ]
          done
