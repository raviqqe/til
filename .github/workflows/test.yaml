name: test
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  go_test:
    strategy:
      fail-fast: false
      matrix:
        directory:
          - go-fasthttp-dual-stack
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      - run: go build
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          working-directory: ${{ matrix.directory }}
  ninja_test:
    strategy:
      fail-fast: false
      matrix:
        directory:
          - c-hello
          - c-stack-operation-elimination
          - ninja-phony
          - ninja-parallel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: homebrew/actions/setup-homebrew@master
      - run: brew install llvm ninja
      - run: ninja
  node_js_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          lfs: true
      - uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v6.0.1
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: pnpm
          node-version-file: package.json
      - run: pnpm i --frozen-lockfile
      - run: pnpm -r build
      - run: node --run lint
      - run: pnpm -r test
  python_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: pipx install uv
      - run: uv sync --all-packages
      - run: uv format --check
      - run: uv run pyrefly check
      - run: uv run pytest
  ruby_test:
    strategy:
      fail-fast: false
      matrix:
        directory:
          - cucumber-example-escape
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a # v1.302.0
      - run: bundler
      - run: bundler exec cucumber --publish-quiet
  rust_test:
    strategy:
      fail-fast: false
      matrix:
        directory:
          - .
          - rust-dyn-future
          - rust-generator
          - rust-hello-world
          - rust-libc
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: cargo build
      - run: cargo clippy
      - run: cargo fmt --check
      - run: cargo test
  scheme_test:
    strategy:
      fail-fast: false
      matrix:
        directory:
          - scheme-call-cc
          - scheme-eval
          - scheme-lzss
          - scheme-macro
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: homebrew/actions/setup-homebrew@master
      - run: brew install gauche
      - run: gosh main.scm
  shell_test:
    strategy:
      fail-fast: false
      matrix:
        directory:
          - llvm-c-calling-convention
          - llvm-pointer-tag
          - llvm-unnamed-addr
          - mlir-c-wrapper
          - scheme-shift-reset
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: homebrew/actions/setup-homebrew@master
      - run: sudo apt update --fix-missing
      - run: sudo apt install gcc-multilib
      - run: ./main.sh
  spell_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: streetsidesoftware/cspell-action@de2a73e963e7443969755b648a1008f77033c5b2 # v8.4.0
  test:
    runs-on: ubuntu-latest
    needs:
      - go_test
      - ninja_test
      - node_js_test
      - ruby_test
      - rust_test
      - scheme_test
      - shell_test
      - spell_check
    if: ${{ always() }}
    steps:
      - run: |
          for result in ${{ join(needs.*.result, ' ') }}; do
            [ $result = success ]
          done
